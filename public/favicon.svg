<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle -->
  <circle cx="16" cy="16" r="12" stroke="#0f1729" stroke-width="1.8" />
  <!-- Vertical meridian (center) -->
  <ellipse cx="16" cy="16" rx="5" ry="12" stroke="#0f1729" stroke-width="1.5" />
  <!-- Horizontal equator -->
  <line x1="4" y1="16" x2="28" y2="16" stroke="#0f1729" stroke-width="1.5" />
  <!-- Upper latitude line -->
  <ellipse cx="16" cy="10" rx="10" ry="2.5" stroke="#0f1729" stroke-width="1.3" />
  <!-- Lower latitude line -->
  <ellipse cx="16" cy="22" rx="10" ry="2.5" stroke="#0f1729" stroke-width="1.3" />
</svg>