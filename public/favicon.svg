<svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle - the globe boundary -->
  <circle cx="16" cy="16" r="12" stroke="#0f1729" stroke-width="1.5" />
  
  <!-- Network nodes - strategic positions -->
  <circle cx="16" cy="6" r="1.3" fill="#0f1729" />
  <circle cx="16" cy="26" r="1.3" fill="#0f1729" />
  <circle cx="6" cy="16" r="1.3" fill="#0f1729" />
  <circle cx="26" cy="16" r="1.3" fill="#0f1729" />
  <circle cx="16" cy="16" r="1.5" fill="#0f1729" />
  <circle cx="10" cy="10" r="1.2" fill="#0f1729" />
  <circle cx="22" cy="10" r="1.2" fill="#0f1729" />
  <circle cx="10" cy="22" r="1.2" fill="#0f1729" />
  <circle cx="22" cy="22" r="1.2" fill="#0f1729" />
  
  <!-- Network connections - thin lines between nodes -->
  <line x1="16" y1="6" x2="16" y2="16" stroke="#0f1729" stroke-width="0.8" />
  <line x1="16" y1="16" x2="16" y2="26" stroke="#0f1729" stroke-width="0.8" />
  <line x1="6" y1="16" x2="16" y2="16" stroke="#0f1729" stroke-width="0.8" />
  <line x1="16" y1="16" x2="26" y2="16" stroke="#0f1729" stroke-width="0.8" />
  <line x1="10" y1="10" x2="16" y2="16" stroke="#0f1729" stroke-width="0.8" />
  <line x1="22" y1="10" x2="16" y2="16" stroke="#0f1729" stroke-width="0.8" />
  <line x1="10" y1="22" x2="16" y2="16" stroke="#0f1729" stroke-width="0.8" />
  <line x1="22" y1="22" x2="16" y2="16" stroke="#0f1729" stroke-width="0.8" />
  
  <!-- Outer ring connections -->
  <line x1="16" y1="6" x2="22" y2="10" stroke="#0f1729" stroke-width="0.6" />
  <line x1="16" y1="6" x2="10" y2="10" stroke="#0f1729" stroke-width="0.6" />
  <line x1="26" y1="16" x2="22" y2="10" stroke="#0f1729" stroke-width="0.6" />
  <line x1="26" y1="16" x2="22" y2="22" stroke="#0f1729" stroke-width="0.6" />
  <line x1="16" y1="26" x2="22" y2="22" stroke="#0f1729" stroke-width="0.6" />
  <line x1="16" y1="26" x2="10" y2="22" stroke="#0f1729" stroke-width="0.6" />
  <line x1="6" y1="16" x2="10" y2="22" stroke="#0f1729" stroke-width="0.6" />
  <line x1="6" y1="16" x2="10" y2="10" stroke="#0f1729" stroke-width="0.6" />
</svg>
